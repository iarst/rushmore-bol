<body>
<header class="app"><h1 onclick="goOffice()">Rushmore Van Lines <span class="tag">MVP · STEPS 1–3</span></h1><div id="hdrMid"></div><nav id="nav"></nav></header>
<div class="wrap" id="app"></div>

<script>
const SEED_FM=[{name:'You (test foreman)',email:'foreman@example.com'},{name:'Mike Torres',email:'mike.torres@example.com'},{name:'Andre Cole',email:'andre.cole@example.com'}];
const store={get(){try{return JSON.parse(localStorage.getItem('rvl_jobs')||'null')||window._j||[]}catch(e){return window._j||[]}},set(j){window._j=j;try{localStorage.setItem('rvl_jobs',JSON.stringify(j))}catch(e){}}};
const foremenStore={get(){try{return JSON.parse(localStorage.getItem('rvl_foremen')||'null')||SEED_FM}catch(e){return SEED_FM}},set(f){try{localStorage.setItem('rvl_foremen',JSON.stringify(f))}catch(e){}}};
function getFm(){try{return localStorage.getItem('rvl_fm')||window._fm||null}catch(e){return window._fm||null}}
function setFm(e){window._fm=e;try{e?localStorage.setItem('rvl_fm',e):localStorage.removeItem('rvl_fm')}catch(x){}}
const $=s=>document.querySelector(s);
const money=n=>(n<0?'-$':'$')+Math.abs(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const num=v=>{if(v===''||v==null)return null;const n=parseFloat(String(v).replace(/[$,]/g,''));return isNaN(n)?null:n;};
function payments(e){const total=+(e&&e.total)||0,dep=+(e&&e.deposit)||0;const bal=Math.round((total-dep)*100)/100;const atPickup=Math.round(bal/2*100)/100;return {total,dep,bal,atPickup,atDelivery:Math.round((bal-atPickup)*100)/100};}
function paymentRows(e){const p=payments(e);return `<div class="kv"><span class="k">Total</span><span>${money(p.total)}</span></div>
  <div class="kv"><span class="k">Deposit (paid at booking)</span><span>−${money(p.dep)}</span></div>
  <div class="kv"><span class="k" style="font-weight:700">Balance due (total − deposit)</span><span style="font-weight:800;color:var(--navy)">${money(p.bal)}</span></div>`;}
const now=()=>new Date().toLocaleString();
const enc=o=>btoa(unescape(encodeURIComponent(JSON.stringify(o))));
const dec=s=>JSON.parse(decodeURIComponent(escape(atob(s))));
const initials=n=>(n||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let cur=null;

const SPECIAL=/PIANO|SAFE|REFRIGERAT|FREEZER|WASH|DRYER|TREADMILL|POOL TABLE|RIDE|RIDING|MOWER|KAYAK|CANOE|GENERATOR|SNOWBLOWER|MOTORCYCLE|JACUZZI|ATV|GOLF CART|VENDING|BULK FEE|GUN/i;
function invSummary(inv){let boxes=0;const special=[];
  inv.rooms.forEach(r=>r.items.forEach(it=>{const n=it.name.toUpperCase();
    if(/BOX|PLASTIC BIN|WARDROBE/.test(n))boxes+=it.qty;
    if(SPECIAL.test(n))special.push((it.qty>1?it.qty+'× ':'')+it.name.replace(/\s*\([^)]*\)/g,'').trim());}));
  return{boxes,special};}
function inventoryHTML(inv){
  if(!inv)return '<p class="muted">No itemized inventory on this estimate.</p>';
  const s=invSummary(inv);
  const chips=`<div class="chips"><span class="chip">${inv.totalPieces} pieces</span><span class="chip">${inv.totalItems} line items</span>
    <span class="chip box">${s.boxes} boxes</span><span class="chip">${inv.rooms.length} rooms</span>
    ${s.special.length?`<span class="chip warn">${s.special.length} bulky / special</span>`:''}</div>`;
  const sp=s.special.length?`<div class="muted" style="margin:2px 0 10px;color:#7a5200">⚠ Crew heads-up: ${esc([...new Set(s.special)].join(' · '))}</div>`:'';
  const rooms=inv.rooms.map(r=>`<div class="rm"><div class="rmh">${esc(r.room)} <span class="muted" style="font-weight:600">· ${r.items.reduce((a,i)=>a+i.qty,0)} pcs</span></div>
    ${r.items.map(it=>`<div class="it ${SPECIAL.test(it.name.toUpperCase())?'sp':''}"><span class="q">${it.qty}×</span><span>${esc(it.name)}</span></div>`).join('')}</div>`).join('');
  return chips+sp+`<details class="inv"><summary>📋 Show / hide room-by-room inventory (${inv.rooms.length} rooms)</summary><div class="rooms" style="margin-top:8px">${rooms}</div></details>`;
}

/* ---------- extra services + customer notes (high-visibility) ---------- */
function bulkyList(e){return e.inv?[...new Set(invSummary(e.inv).special)]:[];}
function svcBadges(e){const b=[];

  if(bulky.length)h+='<div class="callout bulk"><div class="ct">⚠ Bulky / special — bring gear, allow time</div><div class="ci">'+esc(bulky.join(' · '))+'</div></div>';

/* ---------- helpers ---------- */
function pickupKey(j){
  if(j.eta&&j.eta.date)return j.eta.date;
  const m=(j.est&&j.est.pickup||'').match(/(\d{2})\/(\d{2})\/(\d{4})/);
  return m?m[3]+'-'+m[1]+'-'+m[2]:'9999-99-99';
}
function firstPickupKey(j){
  const p=(j.est&&j.est.pickup)||'';
  const md=p.match(/(\d{1,2})\/(\d{1,2})/),yr=p.match(/(\d{4})/);
  return (md&&yr)?yr[1]+'-'+('0'+md[1]).slice(-2)+'-'+('0'+md[2]).slice(-2):'9999-99-99';
}
function saveJob(job){const jobs=store.get();const i=jobs.findIndex(j=>j.id===job.id);const c=JSON.parse(JSON.stringify(job));if(i>=0)jobs[i]=c;else jobs.unshift(c);store.set(jobs);
  try{fetch(BACKEND+'/board/job',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).catch(()=>{});}catch(e){}}
function mergeRemote(remote){
  // the shared database is the source of truth — mirror it exactly so deletes/edits propagate.
  // (new jobs created on a device are pushed to the DB at save time via saveJob, so nothing is lost.)
  if(Array.isArray(remote))store.set(remote);
}
async function syncBoard(){try{const r=await fetch(BACKEND+'/board');const d=await r.json();if(d&&d.ok)mergeRemote(d.jobs);}catch(e){}}

function statusPill(s){if(s==='Awaiting pickup')s='Scheduled';const m={New:'p-grey',Assigned:'p-info',Scheduled:'p-ok',Review:'p-warn',Done:'p-ok'};const t=s==='Review'?'NEEDS REVIEW':s;return '<span class="pill '+(m[s]||'p-grey')+'">'+t+'</span>';}

function rndTok(n){const a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<(n||10);i++)s+=a[Math.floor(Math.random()*a.length)];return s;}
function cardLink(j){return j&&j.cardToken?location.origin+location.pathname+'#c='+j.cardToken:'';}
function ensureCardToken(j){if(!j.cardToken){j.cardToken=rndTok(10);saveJob(j);if(cur&&cur.id===j.id)cur.cardToken=j.cardToken;}return j.cardToken;}
function rotateCard(id){if(!confirm('Rotate the card link?\n\nThe OLD link stops working immediately — anyone holding it loses access. A new link is created.'))return;const j=getJob(id);if(!j)return;j.cardToken=rndTok(10);saveJob(j);if(cur&&cur.id===id)cur.cardToken=j.cardToken;render('job');}
function copyCard(id){const j=getJob(id);const t=cardLink(j);(navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>{const b=event.target;const o=b.textContent;b.textContent='✓ Copied';setTimeout(()=>b.textContent=o,1500);}).catch(()=>prompt('Copy this link:',t));}
function emailCard(id){const j=getJob(id);location.href='mailto:?subject='+encodeURIComponent('Pickup job '+j.id+' — customer card')+'&body='+encodeURIComponent('Open this customer card on site: job details, inventory, and the Bill of Lading to fill & sign.\n\n'+cardLink(j)+'\n\nJob '+j.id+' · '+((j.est&&j.est.customer)||''));}

function logEvent(job,label,detail){job.events=(job.events||[]);job.events.push({label:label,detail:detail||'',at:now(),ip:window._ip||'',geo:window._geo||null,device:(navigator.userAgent||'').slice(0,80)});}

    <h3 class="sg" style="margin-top:14px">Document</h3>

function renderCardGate(id){
  prefetchIP();
  const j=getJob(id);if(!j){$('#app').innerHTML='<div class="card">Job not found.</div>';return;}
  const me=crewMe();
  if(me&&j.crew&&j.crew.phone===me.phone){renderFmJob(id,true);return;}
  $('#app').innerHTML=`<div class="modebar">FOREMAN PORTAL</div>
   <div class="card fmwrap" style="max-width:480px;margin:30px auto"><h2>Job ${esc(j.id)} — who's running this pickup?</h2>
    <p class="sub">Before the job opens, tell the office who you are. Your name is stamped on this job and its paperwork.</p>
    <div class="f"><label class="fl">Your full name <span class="req">*</span></label><input id="crewName" autocomplete="name" placeholder="First Last" value="${me?esc(me.name):''}"></div>
    <div class="f" style="margin-top:10px"><label class="fl">Your phone <span class="req">*</span></label><input id="crewPhone" autocomplete="tel" placeholder="(555) 555-5555" value="${me?esc(me.phone):''}"></div>
    <div class="btnrow"><button onclick="crewEnter('${esc(j.id)}')">Open the job →</button></div></div>`;
}
function crewEnter(id){const n=$('#crewName').value.trim(),p=$('#crewPhone').value.trim();
  if(!n||!p){alert('Enter your name and phone — the office needs to know who is filling the paperwork.');return;}
  const j=getJob(id);if(!j)return;
  j.crew={name:n,phone:p,openedAt:now(),device:(navigator.userAgent||'').slice(0,60),ip:window._ip||''};
  j.crewLog=(j.crewLog||[]).concat([j.crew]);
  logEvent(j,'Customer card opened / crew identified',n+' · '+p);
  if(j.status==='New')j.status='Assigned';
  try{localStorage.setItem('rvl_crew',JSON.stringify({name:n,phone:p}));}catch(e){}
  saveJob(j);renderFmJob(id,true);
}
let CURLINK='';
function linkSnapshot(j){const s=JSON.parse(JSON.stringify(j));delete s.linkId;return s;}
async function hydrateForemanLink(j){
  const box=document.getElementById('fmLinkBox');if(!box)return;
  try{
    let id=j.linkId;
    if(!id){
      const r=await fetch(BACKEND+'/job',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(linkSnapshot(j))});
      if(!r.ok)throw 0;const d=await r.json();id=d.id;if(!id)throw 0;
      j.linkId=id;const st=getJob(j.id);if(st){st.linkId=id;saveJob(st);}if(cur&&cur.id===j.id)cur.linkId=id;
    }

  }
}
function emailLink(){const j=cur;const link=CURLINK||foremanLink(j);location.href='mailto:'+encodeURIComponent(j.foreman.email)+'?subject='+encodeURIComponent('Pickup assigned — Job '+j.id)+'&body='+encodeURIComponent('You have been assigned a pickup. Open your job and confirm a pickup window:\n\n'+link);}
function openAsForeman(){if(cur&&cur.linkId)location.hash='j='+cur.linkId;else location.hash='fm='+enc(cur);}

/* ---------- router & nav ---------- */
function navHTML(mode){return `<button class="${mode==='office'?'act':''}" onclick="goOffice()">Dispatch (office)</button><button class="${mode==='foreman'?'act':''}" onclick="goForeman()">Foreman portal</button>`;}
function router(){
  const h=location.hash||'';
  const mid=$('#hdrMid');if(mid)mid.innerHTML=(h===''?'<span class="hsr"><input id="hdrSearch" placeholder="🔎 Search jobs, estimates, contracts" oninput="hdrSearch()" onfocus="hdrSearch()" autocomplete="off"><div id="searchRes"></div></span>':'');
  if(h.indexOf('#c=')===0){const tk=h.slice(3);$('#nav').innerHTML=navHTML('foreman');$('#app').innerHTML='<div class="card">Loading job…</div>';
    fetch(BACKEND+'/card/'+encodeURIComponent(tk)).then(r=>{if(!r.ok)throw 0;return r.json();}).then(d=>{saveJob(d.job);renderCardGate(d.job.id);}).catch(()=>{$('#app').innerHTML='<div class="card">This customer card link is no longer valid — ask the office to send you a fresh one.</div>';});return;}
  if(h.indexOf('#j=')===0){const id=h.slice(3);$('#nav').innerHTML=navHTML('foreman');$('#app').innerHTML='<div class="card">Loading job…</div>';fetch(BACKEND+'/job/'+encodeURIComponent(id)).then(r=>{if(!r.ok)throw 0;return r.json();}).then(job=>{job.linkId=id;saveJob(job);if(job.foreman&&job.foreman.email)setFm(job.foreman.email);renderFmJob(job.id,true);}).catch(()=>{$('#app').innerHTML='<div class="card">This link could not be opened — it may have expired. Ask the office to resend.</div>';});return;}
  if(h.indexOf('#fm=')===0){try{const job=dec(h.slice(4));if(!getJob(job.id))saveJob(job);if(job.foreman&&job.foreman.email)setFm(job.foreman.email);$('#nav').innerHTML=navHTML('foreman');renderFmJob(job.id,true);}catch(e){$('#app').innerHTML='<div class="card">Invalid link.</div>';}return;}
  if(h.indexOf('#foreman')===0){$('#nav').innerHTML=navHTML('foreman');renderForemanPortal();return;}
  $('#nav').innerHTML=navHTML('office')+' <button onclick="newJob()">📄 Jobs</button>';render('dashboard');
}
/* ---------- header search: board jobs + stored estimates + generated BOLs ---------- */
let _docsCache=null,_docsTs=0;
async function ensureDocs(){if(_docsCache&&Date.now()-_docsTs<60000)return _docsCache;
  try{const[ru,rb]=await Promise.all([fetch(BACKEND+'/estimates/uploads'),fetch(BACKEND+'/bols')]);
    const du=await ru.json(),db=await rb.json();
    _docsCache={ups:(du&&du.uploads)||[],bols:(db&&db.bols)||[]};_docsTs=Date.now();}
  catch(e){_docsCache=_docsCache||{ups:[],bols:[]};}
  return _docsCache;}
function srHay(j){const e=j.est||{},b=j.bol||{};
  const inv=(e.inv&&e.inv.rooms||[]).map(r=>(r.items||[]).map(i=>i.name).join(' ')).join(' ');
  return [j.id,e.customer,e.phone,e.email,e.oAddr,e.dAddr,e.rep,j.status,(j.foreman&&j.foreman.name)||'',b.custPrinted||'',b.order||'',inv].join(' ').toLowerCase();}
async function hdrSearch(){const inp=document.getElementById('hdrSearch'),box=document.getElementById('searchRes');if(!inp||!box)return;
  const q=(inp.value||'').trim().toLowerCase();
  if(q.length<2){box.style.display='none';box.innerHTML='';return;}
  const jobs=store.get().filter(j=>srHay(j).includes(q)).slice(0,8);
  const docs=await ensureDocs();
  if((inp.value||'').trim().toLowerCase()!==q)return; // stale response
  const dq=x=>((x.id||'')+' '+(x.customer||'')+' '+(x.filename||'')+' '+(x.total||'')).toLowerCase().includes(q);
  const ups=docs.ups.filter(dq).slice(0,6),bols=docs.bols.filter(dq).slice(0,6);
  let h='';
  if(jobs.length)h+='<div class="sr-h">Jobs on the board</div>'+jobs.map(j=>`<div class="sr-row" onclick="srOpen('${esc(j.id)}')"><span><b>${esc(j.id)}</b> · ${esc(j.est?.customer||'—')}<div class="muted">${esc(szOf(j.est?.oAddr))} → ${esc(szOf(j.est?.dAddr))}${j.foreman?' · '+esc(j.foreman.name):''}</div></span>${statusPill(j.status)}</div>`).join('');
  if(ups.length)h+='<div class="sr-h">Estimates — original PDFs</div>'+ups.map(u=>`<div class="sr-row" onclick="srDoc('${BACKEND}/estimates/uploads/${esc(u.id)}/pdf')"><span><b>${esc(u.id)}</b> · ${esc(u.customer||'—')}<div class="muted">${esc(u.filename||'')}</div></span><span>📄</span></div>`).join('');
  if(bols.length)h+='<div class="sr-h">Contracts — generated BOLs</div>'+bols.map(b=>`<div class="sr-row" onclick="srDoc('${BACKEND}/bols/${esc(b.id)}/pdf')"><span><b>${esc(b.id)}</b> · ${esc(b.customer||'—')}<div class="muted">${esc(b.filename||'')}</div></span><span>📑</span></div>`).join('');
  box.innerHTML=h||`<div class="empty" style="padding:16px">No matches for “${esc(q)}”</div>`;
  box.style.display='block';}
function srOpen(id){srHide(true);if(location.hash)location.hash='';openJob(id);}
function srDoc(url){srHide(false);window.open(url,'_blank');}
function srHide(clear){const b=document.getElementById('searchRes'),i=document.getElementById('hdrSearch');if(b){b.style.display='none';b.innerHTML='';}if(clear&&i)i.value='';}
document.addEventListener('click',e=>{if(!e.target.closest||!e.target.closest('.hsr'))srHide(false);});
document.addEventListener('keydown',e=>{if(e.key==='Escape')srHide(false);});
window.addEventListener('hashchange',router);
function goOffice(){if(location.hash)location.hash='';else router();}
function goForeman(){if(location.hash==='#foreman')router();else location.hash='#foreman';}

function render(v){const a=$('#app');if(v==='dashboard')return a.innerHTML=vDashboard();if(v==='intake'){a.innerHTML=vIntake();setTimeout(loadUploads,0);return;}if(v==='inbox')return a.innerHTML=vInbox();if(v==='job')return a.innerHTML=vJob();}
function vInbox(){

  const pend=signed.filter(j=>st(j)==='pending'),rej=signed.filter(j=>st(j)==='rejected'),done=signed.filter(j=>st(j)==='approved');
  const row=(j,kind)=>{const b=j.bol;return `<div class="jobrow" style="cursor:default">
    <div style="flex:1"><div class="id">${j.id} · ${esc(j.est?.customer||'—')} ${kind==='done'?'<span class="pill p-ok">completed ✓</span>':kind==='rej'?'<span class="pill" style="background:var(--badbg);color:var(--bad)">sent back</span>':'<span class="pill p-warn">awaiting check</span>'}</div>
      <div class="meta">signed ${esc(b.signedAt||'')} · ${esc(b.custPrinted||'?')} + ${esc((j.crew&&j.crew.name)||(j.foreman&&j.foreman.name)||'crew')} · total ${bolMoney(b.chTotal)}${kind==='rej'&&b.review&&b.review.note?' · <b style="color:var(--bad)">“'+esc(b.review.note)+'”</b>':''}${kind==='done'?' · verified '+esc((b.review&&b.review.at)||''):''}</div></div>

      <button class="sm ghost" onclick="cur=getJob('${j.id}');renderBOLDoc('${j.id}')">📄 e-BOL</button>
      <button class="sm ghost" onclick="renderAuditLog('${j.id}')">🧾 Log</button>
      <button class="sm ghost" onclick="openJob('${j.id}')">Job</button>
      ${kind!=='done'?`<button class="sm" style="background:var(--ok)" onclick="approveBOL('${j.id}','inbox')">✅ Verify &amp; complete</button><button class="sm ghost" style="color:var(--bad)" onclick="rejectBOL('${j.id}','inbox')">↩ Send back</button>`:''}

   <div class="card"><h2>📥 BOL verification inbox</h2><p class="sub">Every signed Bill of Lading lands here first. Verify it against the estimate, then <b>✅ Verify &amp; complete</b> — only after your check-mark is the BOL labeled <b>completed</b> for everyone, the packet stored, and the customer emailed a copy.</p>

   ${rej.length?'<div class="sr-h" style="padding-left:0;margin-top:16px">↩ Sent back — waiting on the crew ('+rej.length+')</div><div class="joblist">'+rej.map(j=>row(j,'rej')).join('')+'</div>':''}
   ${done.length?'<div class="sr-h" style="padding-left:0;margin-top:16px">✅ Completed ('+done.length+')</div><div class="joblist">'+done.map(j=>row(j,'done')).join('')+'</div>':''}</div>`;

function szOf(a){const m=(a||'').match(/,\s*([A-Z]{2})\s+(\d{5})/);return m?m[1]+' '+m[2]:((a||'').split(',')[1]||'').trim();}
function officeRow(j){return `<div class="jobrow" onclick="openJob('${j.id}')">

function shortPick(j){const k=firstPickupKey(j);if(k==='9999-99-99')return 'no date';const p=k.split('-');return (+p[1])+'/'+(+p[2]);}
function origSZ(j){const m=(j.est&&j.est.oAddr||'').match(/,\s*([A-Z]{2})\s+(\d{5})/);return m?m[1]+' '+m[2]:'';}

function vDashboard(){
  const all=store.get().slice().sort((a,b)=>{const ka=firstPickupKey(a),kb=firstPickupKey(b);return ka!==kb?(ka<kb?-1:1):(fmWinOrder(a.eta&&a.eta.window)-fmWinOrder(b.eta&&b.eta.window));});
  const fresh=all.filter(j=>!j.foreman&&!j.crew), rest=all.filter(j=>j.foreman||j.crew);

  let cd=null;
  rest.forEach(j=>{const k=firstPickupKey(j);if(k!==cd){cd=k;rows+='<div class="agday">'+(k==='9999-99-99'?'Pickup date TBD':fmDateLabel(k))+'</div>';}rows+=officeRow(j);});

  if(!jobs.length)rows='<div class="empty">No jobs yet. Open <b>📄 Jobs</b> to bring one in from a broker estimate.</div>';
  const c={New:0,Assigned:0,Scheduled:0,Review:0,Done:0};jobs.forEach(j=>{const st=j.status==='Awaiting pickup'?'Scheduled':j.status;c[st]=(c[st]||0)+1;});

    <div class="card"><h2>Dispatch board</h2><p class="sub">Estimate in → assign a foreman → he confirms a 3-hour pickup window.</p>

    <button class="ghost" onclick="checkInbox(this)">🔄 Refresh</button>
    <span class="right" style="align-self:center"><span class="pill p-grey">${c.New||0} new</span> <span class="pill p-info">${c.Assigned||0} assigned</span> <span class="pill p-ok">${c.Scheduled||0} scheduled</span>${c.Review?` <span class="pill p-warn">${c.Review} to review</span>`:''}</span></div>

}
function importJobs(list){let n=0;(list||[]).forEach(j=>{if(!j||!j.id)return;const ex=getJob(j.id);
  if(!ex){saveJob(j);n++;}
  else if(j.created&&ex.created&&String(j.created).includes('T')&&String(ex.created).includes('T')&&j.created>ex.created){saveJob(j);n++;} // board was reset / re-ingested — the remote copy is the fresh one
  else if((j.reparsed||'')>(ex.reparsed||'')){ex.est=j.est;ex.reparsed=j.reparsed;saveJob(ex);n++;}   // estimate was re-parsed on the server
  else if(!ex.foreman&&j.est&&j.est.inv&&!(ex.est&&ex.est.inv)){ex.est=j.est;saveJob(ex);n++;}});return n;}
async function checkInbox(btn){
  const o=btn.textContent;btn.textContent='⏳ Refreshing…';btn.disabled=true;
  try{
    const r=await fetch(BACKEND+'/ingest/poll',{method:'POST'});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error||'failed');
    mergeRemote(d.jobs);
    btn.textContent=o;btn.disabled=false;
    if(d.new)alert('Pulled in '+d.new+' new estimate'+(d.new>1?'s':'')+' from estimates@.');
    render('dashboard');
  }catch(e){btn.textContent=o;btn.disabled=false;alert('Refresh failed: '+e.message+'\n(The backend may be waking up — wait ~40s and try again.)');}
}

async function loadUploads(){const box=document.getElementById('upList');if(!box)return;
  try{
    const [ru,rb]=await Promise.all([fetch(BACKEND+'/estimates/uploads'),fetch(BACKEND+'/bols')]);
    const d=await ru.json(),db=await rb.json().catch(()=>({}));
    if(!d.ok)throw new Error(d.error||'failed');
    const bols={};((db&&db.bols)||[]).forEach(b=>{bols[b.id]=b;});
    const ups=d.uploads||[];
    const bolBtn=id=>bols[id]?`<button class="sm ghost" style="color:#1B6B30" onclick="window.open('${BACKEND}/bols/${esc(id)}/pdf','_blank')">📑 BOL</button>`:'';
    let rows=ups.map(u=>`<div class="jobrow" style="cursor:default">
      <div style="flex:1"><div class="id">${esc(u.id)} · ${esc(u.customer||'—')}${u.total?` · <span style="font-weight:600;color:var(--muted)">$${esc((+u.total).toLocaleString(undefined,{minimumFractionDigits:2}))}</span>`:''}</div>
        <div class="meta">${esc(u.filename||'')} · ${Math.max(1,Math.round((u.size||0)/1024))} KB · ${u.source==='inbox'?'<span style="color:#1D9E75">📥 estimates@</span>':'<span style="color:#0058B0">📄 uploaded</span>'} · ${esc((u.uploaded||'').slice(0,10))}${bols[u.id]?' · <b style="color:#1B6B30">BOL ✓</b>':''}</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="sm ghost" onclick="window.open('${BACKEND}/estimates/uploads/${esc(u.id)}/pdf','_blank')">👁 View</button>
        ${bolBtn(u.id)}
        <button class="sm ghost" onclick="reparseUpload('${esc(u.id)}',this)">↻ Re-parse</button>
        <button class="sm ghost" style="color:#D70015" onclick="deleteUpload('${esc(u.id)}',this)">🗑</button></div></div>`).join('');
    // generated BOLs whose estimate PDF isn't stored (e.g. older jobs)
    const seen=new Set(ups.map(u=>String(u.id)));
    ((db&&db.bols)||[]).filter(b=>!seen.has(String(b.id))).forEach(b=>{rows+=`<div class="jobrow" style="cursor:default">
      <div style="flex:1"><div class="id">${esc(b.id)} · ${esc(b.customer||'—')}</div>
        <div class="meta">${esc(b.filename||'')} · ${Math.max(1,Math.round((b.size||0)/1024))} KB · <b style="color:#1B6B30">📑 generated BOL</b> · ${esc((b.uploaded||'').slice(0,10))}</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${bolBtn(b.id)}</div></div>`;});
    box.innerHTML=rows||'<div class="empty">Nothing stored yet — drop an estimate above, or pull new ones in from estimates@.</div>';
  }catch(e){box.innerHTML='<div class="empty">Could not load stored documents ('+esc(e.message)+') — the backend may be waking up.</div>';}}
async function reparseUpload(id,btn){const o=btn.textContent;btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch(BACKEND+'/estimates/uploads/'+encodeURIComponent(id)+'/reparse',{method:'POST'});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok)throw new Error(d.error||('HTTP '+r.status));
    const ex=getJob(d.job.id);
    if(ex&&d.updated){ex.est=d.job.est;ex.reparsed=d.job.reparsed;saveJob(ex);}else if(!ex)saveJob(d.job);
    btn.textContent=o;btn.disabled=false;
    alert('Job '+d.job.id+' '+(d.updated?'re-parsed and updated on the board (dispatch state kept).':'parsed and added to the board.'));
  }catch(e){btn.textContent=o;btn.disabled=false;alert('Re-parse failed: '+e.message);}}
async function deleteUpload(id,btn){
  if(!confirm('Delete the STORED PDF for estimate '+id+'?\n\nThis removes only the saved source document — the job on the dispatch board is not touched.'))return;
  btn.disabled=true;
  try{
    const r=await fetch(BACKEND+'/estimates/uploads/'+encodeURIComponent(id)+'/delete',{method:'POST'});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok)throw new Error(d.error||('HTTP '+r.status));
    loadUploads();
  }catch(e){btn.disabled=false;alert('Delete failed: '+e.message);}}
function dropEst(ev){ev.preventDefault();const d=document.getElementById('updrop');d.classList.remove('over');const f=ev.dataTransfer.files&&ev.dataTransfer.files[0];if(f)uploadEst(f);}
function dropReset(){const d=document.getElementById('updrop');if(!d)return;d.classList.remove('busy');
  d.querySelector('.dt').textContent='📄 Drop the estimate PDF here';
  d.querySelector('.dd').textContent="or click to choose a file — it's parsed exactly like an emailed estimate (inventory, services, charges)";}
async function uploadEst(f){
  if(!f)return;
  if(!/\.pdf$/i.test(f.name)){alert('Please choose a PDF estimate.');return;}
  const drop=document.getElementById('updrop');
  drop.classList.add('busy');
  drop.querySelector('.dt').innerHTML='⏳ Uploading &amp; parsing <b>'+esc(f.name)+'</b>';
  drop.querySelector('.dd').textContent='Reading customer, inventory, services and charges — a few seconds…';
  try{
    const fd=new FormData();fd.append('file',f,f.name);
    const r=await fetch(BACKEND+'/estimates/upload',{method:'POST',body:fd});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok)throw new Error((d&&d.error)||('HTTP '+r.status));
    dropReset();
    if(d.dupe){
      const ex=getJob(d.job.id);
      if(ex){ex.est=d.job.est;saveJob(ex);}else{saveJob(d.job);}
      alert('Job '+d.job.id+' was already on the board — its estimate was RE-PARSED and updated (fees, totals, inventory). Foreman, pickup window and signatures are untouched.');
      openJob(d.job.id);return;
    }
    saveJob(d.job);openJob(d.job.id);
  }catch(e){dropReset();alert('Upload failed: '+e.message+'\n(The backend may be waking up — wait ~40s and try again.)');}
}

function crewNotes(e){
  const notes=[];const acc={House:'House — first flight (14 stairs) included; confirm truck parking & driveway clearance.',Apartment:'Apartment — check floor / elevator / long-carry (possible extra charges); reserve the elevator.',Storage:'Storage facility — confirm access hours, unit number & loading dock.'};
  if(e.oType)notes.push(['Origin access',acc[e.oType]||e.oType]);
  if(e.dType)notes.push(['Destination access',acc[e.dType]||e.dType]);
  const inv=e.inv;
  if(!inv){notes.push(['Inventory','No itemized inventory on this estimate — confirm contents with the office.']);return notes;}
  const all=[];inv.rooms.forEach(r=>r.items.forEach(it=>all.push(it)));
  const has=re=>all.filter(it=>re.test(it.name.toUpperCase()));
  const clean=it=>(it.qty>1?it.qty+'× ':'')+it.name.replace(/\s*\([^)]*\)/g,'').trim();
  const sp=has(SPECIAL);if(sp.length)notes.push(['Bulky / special — allow extra time + gear',[...new Set(sp.map(clean))].join(' · ')+'. Bring appliance dolly, straps & ramps.']);
  let boxes=0;all.forEach(it=>{if(/BOX|PLASTIC BIN|WARDROBE/.test(it.name.toUpperCase()))boxes+=it.qty;});
  if(boxes)notes.push(['Boxes',boxes+' boxes (incl. wardrobe) — bring wardrobe bars; stack boxes to stabilize the load.']);
  const pbo=has(/\(PBO\)|\bPBO\b/);if(pbo.length)notes.push(['Packed by owner (PBO) — limited liability',[...new Set(pbo.map(it=>it.name.replace(/\s*\([^)]*\)/g,'').trim()))].join(' · ')+'. Note condition at origin.']);
  if(has(/BED|DESK|DINING TABLE|TABLE, DINING|CRIB|BUNK/).length)notes.push(['Disassembly likely','Beds, desks, dining table — bring tools; all drawers must be emptied before the move.']);
  const fr=has(/TV|FLAT SCREEN|PICTURE|PAINTING|MIRROR|GLASS/);if(fr.length)notes.push(['Fragile — pad & box',[...new Set(fr.map(it=>it.name.replace(/\s*\([^)]*\)/g,'').trim()))].slice(0,6).join(' · ')+'. Use TV / picture cartons.']);
  notes.push(['Reminders','No plastic bags on the truck. Confirm the valuation election ('+e.valuation+') with the customer at signing.']);
  return notes;
}

function bolSeed(job){const e=job.est||{},b=job.bol||{};const p=payments(e);const d=(job.eta&&job.eta.date)||'';
  // seed charge lines so they SUM to the estimate total (any unitemized remainder lands in "Other")
  const _vol=e.volume?+String(e.volume).replace(/,/g,''):0;

const BACKEND='https://rushmore-bol-backend.onrender.com';
function parseCSZ(s){s=String(s||'');const i=s.lastIndexOf(',');const city=i>=0?s.slice(0,i).trim():s.trim();const rest=(i>=0?s.slice(i+1):'').trim().split(/\s+/);return {city:city,state:rest[0]||'',zip:rest[1]||''};}
function backendPayload(job){const e=job.est||{},b=job.bol||{};const oc=parseCSZ(b.oCSZ),dc=parseCSZ(b.dCSZ);
  const sg=(k,w)=>{const a=(b.sigs||{})[k];return a&&a[w]?a[w].img:'';};
  // AS-22 total = ONLY the accessorial services that have a row on that page (not packing/bulky/conv/binding/other, which live on the BOL face)
  const accKeys=['chStairs','chElevator','chLongCarry','chShuttle','chSIT','chStgHandling','chExtraLabor','chExtraStop','chWaiting','chRedelivery'];
  const chAccTotal=accKeys.reduce((t,k)=>t+(num(b[k])||0),0);
  // ----- dynamic, itemized charge lines for the generated BOL (one line per fee, any number) -----
  const Lc=loc=>(loc&&loc!=='—')?loc:'';
  const charges=[];
  const add=(label,amt,detail)=>{if((num(amt)||0)!==0)charges.push({label:label,amount:(num(amt)||0).toFixed(2),detail:detail||''});};
  add('Transportation',b.chTransport,(e.volume?e.volume+' cu ft':'')+(e.rate?' @ $'+e.rate+'/cf':''));
  add('Fuel surcharge',b.chFuel,(b.fuelPct?b.fuelPct+'%':''));
  add('Packing labor & materials',b.chPacking,(b.fullPack&&b.packRateCf?'$'+b.packRateCf+'/cf':''));
  add('Bulky articles',b.chBulky,'');
  add('Stairs',b.chStairs,Lc(b.locStairs));
  add('Elevator',b.chElevator,Lc(b.locElevator));
  add('Long carry',b.chLongCarry,Lc(b.locLongCarry));
  add('Shuttle',b.chShuttle,Lc(b.locShuttle));
  add('Storage in transit (SIT)',b.chSIT,Lc(b.locSIT));
  add('Storage handling',b.chStgHandling,Lc(b.locStgHandling));
  add('Extra labor',b.chExtraLabor,Lc(b.locExtraLabor));
  add('Extra stop',b.chExtraStop,Lc(b.locExtraStop));
  add('Waiting time / overnight',b.chWaiting,Lc(b.locWaiting));
  add('Convenience fee',b.chConv,'');
  add('PGS delivery',b.chPGS,'');
  add('Binding estimate fee',b.chBinding,'');
  add('Expedited',b.chExpedited,'');
  add('Redelivery',b.chRedelivery,'');
  add(((b.chOtherDesc||'Other charges').replace(/\s*\$[\d,]+\.?\d*/g,'').trim()||'Other charges'),b.chOther,'');
  (b.customCharges||[]).forEach(cc=>{if(cc&&(num(cc.amt)||0)!==0)charges.push({label:(cc.label||'Other charge'),amount:(num(cc.amt)||0).toFixed(2),detail:''});});
  const payment={total:b.chTotal,discount:b.payDiscount,deposit:b.payDeposit,originPayment:b.payOrigin,balanceDest:b.payBalanceDest,balance30:b.payBalance30,priceAdj:b.payPriceAdj,destination:b.payDestination};
  const valuationAmt=(b.valuation==='full')?(b.fvpEstimate||b.declaredValue||''):'0.00';
  return {van:b.vanNo,order:b.order||job.id,agreedPickup:b.agreedPickup,actualPickup:b.actualPickup,firstAvail:b.firstAvail,deliverNoLater:b.deliverNoLater,
    charges:charges,payment:payment,declaredValue:b.declaredValue,valuationAmt:valuationAmt,exceptions:b.exceptions,method:b.method,custSig:b.custSig,foreSig:b.foreSig,custPrinted:b.custPrinted,signedAt:b.signedAt,
    oName:b.oName,oStreet:b.oStreet,oCity:oc.city,oState:oc.state,oZip:oc.zip,oPhone:b.oPhone,
    dName:b.dName,dStreet:b.dStreet,dCity:dc.city,dState:dc.state,dZip:dc.zip,dPhone:b.dPhone,
    enrouteName:b.enrouteName,enroutePhone:b.enroutePhone,valuation:b.valuation,
    chTransport:b.chTransport,fuelPct:b.fuelPct,chFuel:b.chFuel,chPacking:b.chPacking,chBulky:b.chBulky,
    chStairs:b.chStairs,locStairs:b.locStairs,chElevator:b.chElevator,locElevator:b.locElevator,chLongCarry:b.chLongCarry,locLongCarry:b.locLongCarry,
    chShuttle:b.chShuttle,locShuttle:b.locShuttle,chSIT:b.chSIT,locSIT:b.locSIT,chStgHandling:b.chStgHandling,locStgHandling:b.locStgHandling,
    chExtraLabor:b.chExtraLabor,locExtraLabor:b.locExtraLabor,chExtraStop:b.chExtraStop,locExtraStop:b.locExtraStop,chWaiting:b.chWaiting,locWaiting:b.locWaiting,
    chRedelivery:b.chRedelivery,chAccTotal:chAccTotal?chAccTotal.toFixed(2):'',
    chOther:(function(){const cc=(b.customCharges||[]).reduce((t,c)=>t+(num(c.amt)||0),0);const o=(num(b.chOther)||0)+cc;return o?o.toFixed(2):'';})(),
    chOtherDesc:(function(){const parts=[(b.chOtherDesc||'').replace(/\s*\$[\d,]+\.?\d*/g,'').trim()].concat((b.customCharges||[]).map(c=>(c.label||'').trim())).filter(Boolean);return parts.join(' + ').slice(0,60);})(),
    chTotal:b.chTotal,payDiscount:b.payDiscount,payDeposit:b.payDeposit,payOrigin:b.payOrigin,payBalanceDest:b.payBalanceDest,payPriceAdj:b.payPriceAdj,payDestination:b.payDestination,payBalance30:b.payBalance30,
    dedicatedTruck:b.dedicatedTruck,expeditedDate:b.expeditedDate,fullPack:b.fullPack,materialsNote:b.materialsNote,storageStart:b.storageStart,storageEnd:b.storageEnd,walkupFlights:b.walkupFlights,dwellingD:b.dwellingD,
    ttAccess:b.ttAccess,storage:b.storage,dwellingO:b.dwellingO,volume:e.volume,rate:e.rate,packTotal:b.packTotal,
    sigs:{valuation:sg('valuation','cust'),documents:sg('documents','cust'),bolReceipt_cust:sg('bolReceipt','cust'),bolReceipt_carrier:sg('bolReceipt','carrier'),
      pickup_cust:sg('pickup','cust'),pickup_carrier:sg('pickup','carrier'),accessorial_cust:sg('accessorial','cust'),accessorial_carrier:sg('accessorial','carrier'),
      ldf:sg('ldf','cust'),pms_cust:sg('pms','cust'),pms_carrier:sg('pms','carrier'),valuationInitials:(b.valuation==='waiver'?(b.custInit||''):''),faddInitials:(b.faddInit||'')}};}
function generateOfficialBOL(id){const job=getJob(id);if(!job||!job.bol){alert('Sign the Bill of Lading first.');return;}
  // open the new window NOW, inside the click, so the popup blocker allows it; fill it once the PDF is ready
  const w=window.open('','_blank');
  if(w)w.document.write('<title>Bill of Lading</title><p style="font-family:sans-serif;padding:24px;color:#444">Generating your Bill of Lading…</p>');
  const btn=window.event&&window.event.target,orig=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='Generating your BOL…';}
  fetch(BACKEND+'/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(backendPayload(job))})
    .then(r=>{if(!r.ok)throw new Error('server '+r.status);return r.blob();})
    .then(blob=>{const u=URL.createObjectURL(blob);if(w)w.location.href=u;else window.open(u,'_blank');})
    .catch(err=>{if(w)w.close();alert('Could not reach the BOL service ('+err.message+'). The free server may be waking up — wait ~40s and try again.');})
    .finally(()=>{if(btn){btn.disabled=false;btn.textContent=orig;}});}
function openBOLDoc(id){renderBOLDoc(id);}
function bolMoney(x){return money(num(x)||0);}
function sigLabelDoc(b,key){if(key==='valuation')return 'Valuation election — '+(b.valuation==='full'?'Option 1, Full Value':'Option 2, 60¢/lb waiver');const pt=SIGPTS.find(p=>p.key===key);return pt?pt.label:key;}function docSig(b,key){const pt=SIGPTS.find(p=>p.key===key);if(!pt)return '';const a=(b.sigs||{})[key]||{};
  const dtxt=(key==='valuation')?(b.valuation==='full'?FULL_TEXT:WAIVER_TEXT):(SIG_TEXT[key]||'');
  return `<div class="docack"><div class="dackt"><b>${esc(sigLabelDoc(b,key))}.</b> ${esc(dtxt)}</div><div class="docsigs">${pt.who.map(w=>{const sg=a[w];const who=w==='cust'?("Customer's signature &amp; date"+(b.custPrinted?' — printed name: '+esc(b.custPrinted):'')):"Carrier / foreman signature &amp; date";return `<div class="docsig">${sg?`<img src="${sg.img}">`:'<div style="height:44px"></div>'}<div class="docsigln">${who}${sg?' · '+esc(sg.ts):''}</div></div>`;}).join('')}</div></div>`;}
function renderBOLDoc(id){const j=getJob(id);if(!j||!j.bol){goForeman();return;}const e=j.est||{},b=j.bol;
  const back=getFm()?`openFmJob('${id}')`:`openJob('${id}')`;
  const acc=[['Stairs',b.locStairs,b.chStairs],['Elevator',b.locElevator,b.chElevator],['Long carry',b.locLongCarry,b.chLongCarry],['Shuttle',b.locShuttle,b.chShuttle],['Storage in transit',b.locSIT,b.chSIT],['Storage handling',b.locStgHandling,b.chStgHandling],['Extra labor',b.locExtraLabor,b.chExtraLabor],['Extra stop',b.locExtraStop,b.chExtraStop],['Waiting / overnight',b.locWaiting,b.chWaiting]];
  const accRows=acc.filter(a=>num(a[2])).map(a=>`<tr><td>${a[0]}${a[1]&&a[1]!=='—'?' ('+esc(a[1])+')':''}</td><td class="r">${bolMoney(a[2])}</td></tr>`).join('');
  $('#app').innerHTML=`<div class="btnrow noprint" style="margin:0 0 12px"><button class="ghost sm" onclick="${back}">← Back</button><button class="sm" onclick="window.print()">🖨️ Print / Save PDF</button></div>
   <div class="card" id="sheetdoc">
     <div class="sampleband">PROTOTYPE · electronic Bill of Lading — signed ${esc(b.signedAt||'')}</div>
     <div class="sheethead"><div><div class="brand">RUSHMORE VAN LINES</div><div class="muted">Interstate Bill of Lading · DOT ${esc(b.usdot||'')} · ICC/MC ${esc(b.mc||'')}</div></div>
       <div style="text-align:right"><div style="font-weight:800;font-size:16px">Job ${esc(b.order||j.id)}</div><div class="muted">Van ${esc(b.vanNo||'—')} · pickup ${esc(b.actualPickup||'')}</div></div></div>
     <div class="grid" style="margin-top:12px">
       <div class="f"><label class="fl">Origin</label><span class="v">${esc(b.oName||e.customer)}</span><span>${esc(b.oStreet)}, ${esc(b.oCSZ)}</span><span class="muted">${esc(b.oPhone||'')}</span></div>
       <div class="f"><label class="fl">Destination</label><span class="v">${esc(b.dName||e.customer)}</span><span>${esc(b.dStreet)}, ${esc(b.dCSZ)}</span><span class="muted">${esc(b.dPhone||'')}</span></div></div>
     <h3 class="sg" style="margin-top:14px">Valuation</h3>
     <div class="note">${b.valuation==='full'?'Option 1 — Full (Replacement) Value Protection'+(num(b.declaredValue)?' · declared value '+bolMoney(b.declaredValue):''):'Option 2 — Waiver, Released Value 60¢ / lb per article'+(b.custInit?' · initialed by customer <img src="'+b.custInit+'" style="height:22px;vertical-align:middle;border-bottom:1px solid #9a9aa0">':'')}</div>
     ${docSig(b,'valuation')}
     <h3 class="sg" style="margin-top:6px">Services &amp; charges</h3>
     <table class="doctbl"><tbody>
       <tr><td>Transportation (${esc(e.volume)} cf @ $${esc(e.rate)})</td><td class="r">${bolMoney(b.chTransport)}</td></tr>
       ${num(b.chFuel)?`<tr><td>Fuel surcharge</td><td class="r">${bolMoney(b.chFuel)}</td></tr>`:''}
       ${num(b.chPacking)?`<tr><td>Packing labor &amp; materials</td><td class="r">${bolMoney(b.chPacking)}</td></tr>`:''}
       ${num(b.chBulky)?`<tr><td>Bulky articles</td><td class="r">${bolMoney(b.chBulky)}</td></tr>`:''}
       ${accRows}
       ${num(b.chConv)?`<tr><td>Convenience fee</td><td class="r">${bolMoney(b.chConv)}</td></tr>`:''}
       ${num(b.chPGS)?`<tr><td>PGS delivery</td><td class="r">${bolMoney(b.chPGS)}</td></tr>`:''}
       ${num(b.chBinding)?`<tr><td>Binding estimate fee</td><td class="r">${bolMoney(b.chBinding)}</td></tr>`:''}
       ${num(b.chOther)?`<tr><td>Other</td><td class="r">${bolMoney(b.chOther)}</td></tr>`:''}
       <tr class="tot"><td>TOTAL APPLICABLE CHARGES</td><td class="r">${bolMoney(b.chTotal)}</td></tr>
     </tbody></table>
     ${docSig(b,'accessorial')}
     <h3 class="sg" style="margin-top:6px">Payment</h3>
     <table class="doctbl"><tbody>
       <tr><td>Prepaid deposit</td><td class="r">${bolMoney(b.payDeposit)}</td></tr>
       <tr><td>Origin payment collected${b.method?' ('+esc(b.method)+')':''}</td><td class="r">${bolMoney(b.payOrigin)}</td></tr>
       <tr><td>Balance due at destination</td><td class="r">${bolMoney(b.payBalanceDest)}</td></tr>
     </tbody></table>

     <div class="note">Storage: ${b.storage?'Yes ('+esc(b.storageStart)+' – '+esc(b.storageEnd)+')':'No'} · Tractor-trailer access: ${b.ttAccess?'Yes':'No'} · Origin ${esc(b.dwellingO)} · Destination ${esc(b.dwellingD)}${b.accessExplain?' · Access notes: '+esc(b.accessExplain):''}</div>
     ${docSig(b,'ldf')}
     <h3 class="sg" style="margin-top:6px">Packing &amp; materials (PMS-19)</h3>
     <div class="note">Full packing: ${b.fullPack?'Yes':'No'}${b.materialsNote?' · '+esc(b.materialsNote):''}${num(b.packTotal)?' · total '+bolMoney(b.packTotal):''}</div>

     <div class="note">${esc(b.exceptions||'None noted at pickup.')}</div>
     <p class="muted" style="margin-top:12px">Audit trail — signed ${esc(b.signedAt||'')}${b.geo?' · GPS '+b.geo.lat+', '+b.geo.lng:''} · ${esc(b.device||'')}</p>
   </div>`;
  window.scrollTo(0,0);

/* ---- PIN gate + app init ---- */
function initApp(){
  try{const all=store.get();const clean=all.filter(j=>j.id!=='90000001');if(clean.length!==all.length)store.set(clean);}catch(e){}
  router();
  // pull the shared board so this device sees the same jobs as every other device
  if(isOfficeView())syncBoard().then(()=>{if(!location.hash)render('dashboard');});
  setTimeout(autoPoll,4000);
  setInterval(autoPoll,5*60*1000);
}
function gate(){
  if(localStorage.getItem('rvl_pin')==='2026'){initApp();return;}
  const ov=document.createElement('div');ov.id='pinGate';
  ov.innerHTML='<div class="pinbox"><div class="pinlogo">Rushmore Van Lines</div><div class="pinsub">Enter access PIN to continue</div><input id="pinIn" type="password" inputmode="numeric" maxlength="8" autocomplete="off" placeholder="PIN"><button id="pinBtn">Enter</button><div id="pinErr" class="pinerr"></div></div>';
  document.body.appendChild(ov);
  const inp=ov.querySelector('#pinIn'),btn=ov.querySelector('#pinBtn'),err=ov.querySelector('#pinErr');
  function tryPin(){if(inp.value.trim()==='2026'){localStorage.setItem('rvl_pin','2026');ov.remove();initApp();}else{err.textContent='Incorrect PIN — try again';inp.value='';inp.focus();}}
  btn.onclick=tryPin;inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryPin();});
  setTimeout(()=>inp.focus(),60);
}
gate();

/* ---- auto-poll the inbox every 5 min on the office board ---- */
function isOfficeView(){const h=location.hash||'';return !(h.indexOf('#j=')===0||h.indexOf('#fm=')===0||h.indexOf('#foreman')===0);}
async function autoPoll(){
  if(!isOfficeView())return;
  try{
    const before=store.get().length;
    const r=await fetch(BACKEND+'/ingest/poll',{method:'POST'});
    const d=await r.json();if(!d.ok)return;
    if(Array.isArray(d.jobs))store.set(d.jobs);
    if(!location.hash&&(d.new||store.get().length!==before))render('dashboard');
  }catch(e){}
}
