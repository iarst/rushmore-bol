/* ---------- extraction ---------- */
function extract(text){
  const g=(re,d='')=>{const m=text.match(re);return m?m[1].trim():d;};const n=re=>num(g(re));
  return{job:g(/Job\s*#?\s*(\d{6,})/i)||g(/(\d{8})/),
    rep:g(/Customer Rep:\s*([A-Za-z .']+?)(?:\s{2,}|\(|\n)/i),repPhone:g(/Customer Rep:[^\n(]*(\(\d{3}\)\s?\d{3}-\d{4})/i),
    customer:g(/Customer:\s*([A-Za-z .'-]+?)(?:\s{2,}|\()/i),phone:g(/(\(\d{3}\)\s?\d{3}-\d{4})/),email:g(/([\w.+-]+@(?!safeship)[\w.-]+\.\w+)/i),
    oAddr:g(/Moving From:\s*(.+?)(?:\s*\(|$)/im),dAddr:g(/Moving To:\s*(.+?)(?:\s*\(|$)/im),
    oType:g(/Moving From:.*\(([^)]+)\)/i),dType:g(/Moving To:.*\(([^)]+)\)/i),
    miles:g(/Long Distance,\s*([\d,]+)\s*miles/i),moveDay:g(/Move Day:\s*([A-Za-z\/]+)/i),
    volume:n(/Volume:\s*([\d,]+)/i),rate:n(/Rate:\s*\$?([\d.]+)/i),basic:n(/Basic[^$]*\$([\d,]+\.?\d*)/i),
    total:n(/Total[^$]*\$([\d,]+\.?\d*)/i),deposit:n(/(?:deposit|Customer Payment)[^$]*\$([\d,]+\.?\d*)/i),
    valuation:/Full Value/i.test(text)?'Full Value Protection':(/60c|60¢|0\.60|waiver/i.test(text)?'60¢/lb waiver':'See estimate'),
    pgs:/\bPGS\b|Premium Guaranteed/i.test(text),
    fullPack:/Full Pack(?:ing)?\s*:?\s*Yes|Full Pack(?:ing)?\b/i.test(text),
    expedited:/Expedited|Guaranteed Delivery|Exclusive Use/i.test(text),
    notes:g(/(?:Special Instructions|Customer Notes|Notes)\s*:\s*(.+?)(?:\n|$)/i),
    pickup:g(/(?:Requested )?pickup:?\s*([\d/–-]+)/i)||'06/12/2026',delivery:g(/Delivery:\s*([\d/]+)/i)||'06/12/2026',
    firstDelivery:g(/1st Available Delivery:\s*([\d/]+)/i),
    inv:parseInventory(text)};
}
function parseInventory(text){
  const m=text.match(/Articles List\s+(\d+)\s+Items?\s+(\d+)\s+Pieces?/i); if(!m)return null;
  let start=text.indexOf(m[0])+m[0].length, end=text.length;
  [/Packing Material/i,/Understanding Your Estimate/i].forEach(re=>{const mm=text.slice(start).match(re);if(mm)end=Math.min(end,start+mm.index);});
  const lines=text.slice(start,end).split('\n').map(l=>l.trim()).filter(Boolean);
  const rooms=[];let curR=null;
  for(const l of lines){
    if(/^qty\b/i.test(l)&&/item/i.test(l))continue;
    const im=l.match(/^(\d+)\s+(.+)$/);
    if(im){if(!curR){curR={room:'GENERAL',items:[]};rooms.push(curR);}curR.items.push({qty:+im[1],name:im[2]});}
    else{curR={room:l,items:[]};rooms.push(curR);}
  }
  return{totalItems:+m[1],totalPieces:+m[2],rooms:rooms.filter(r=>r.items.length)};
}
const SPECIAL=/PIANO|SAFE|REFRIGERAT|FREEZER|WASH|DRYER|TREADMILL|POOL TABLE|RIDE|RIDING|MOWER|KAYAK|CANOE|GENERATOR|SNOWBLOWER|MOTORCYCLE|JACUZZI|ATV|GOLF CART|VENDING|BULK FEE|GUN/i;
function invSummary(inv){let boxes=0;const special=[];
  inv.rooms.forEach(r=>r.items.forEach(it=>{const n=it.name.toUpperCase();
    if(/BOX|PLASTIC BIN|WARDROBE/.test(n))boxes+=it.qty;
    if(SPECIAL.test(n))special.push((it.qty>1?it.qty+'× ':'')+it.name.replace(/\s*\([^)]*\)/g,'').trim());}));
  return{boxes,special};}
function inventoryHTML(inv){
  if(!inv)return '<p class="muted">No itemized inventory on this estimate.</p>';
  const s=invSummary(inv);
  const chips=`<div class="chips"><span class="chip">${inv.totalPieces} pieces</span><span class="chip">${inv.totalItems} line items</span>
    <span class="chip box">${s.boxes} boxes</span><span class="chip">${inv.rooms.length} rooms</span>
    ${s.special.length?`<span class="chip warn">${s.special.length} bulky / special</span>`:''}</div>`;
  const sp=s.special.length?`<div class="muted" style="margin:2px 0 10px;color:#7a5200">⚠ Crew heads-up: ${esc([...new Set(s.special)].join(' · '))}</div>`:'';
  const rooms=inv.rooms.map(r=>`<div class="rm"><div class="rmh">${esc(r.room)} <span class="muted" style="font-weight:600">· ${r.items.reduce((a,i)=>a+i.qty,0)} pcs</span></div>
    ${r.items.map(it=>`<div class="it ${SPECIAL.test(it.name.toUpperCase())?'sp':''}"><span class="q">${it.qty}×</span><span>${esc(it.name)}</span></div>`).join('')}</div>`).join('');
  return chips+sp+`<div class="rooms">${rooms}</div>`;
}

  return h;}

}

function newJob(){cur={id:'tmp'+Date.now(),est:null,foreman:null,eta:null,status:'New',created:now()};if(location.hash)location.hash='';render('intake');}

/* ===== JOB SHEET (contract + inventory + crew notes) ===== */
function crewNotes(e){
  const notes=[];const acc={House:'House — first flight (14 stairs) included; confirm truck parking & driveway clearance.',Apartment:'Apartment — check floor / elevator / long-carry (possible extra charges); reserve the elevator.',Storage:'Storage facility — confirm access hours, unit number & loading dock.'};
  if(e.oType)notes.push(['Origin access',acc[e.oType]||e.oType]);
  if(e.dType)notes.push(['Destination access',acc[e.dType]||e.dType]);
  const inv=e.inv;
  if(!inv){notes.push(['Inventory','No itemized inventory on this estimate — confirm contents with the office.']);return notes;}
  const all=[];inv.rooms.forEach(r=>r.items.forEach(it=>all.push(it)));
  const has=re=>all.filter(it=>re.test(it.name.toUpperCase()));
  const clean=it=>(it.qty>1?it.qty+'× ':'')+it.name.replace(/\s*\([^)]*\)/g,'').trim();
  const sp=has(SPECIAL);if(sp.length)notes.push(['Bulky / special — allow extra time + gear',[...new Set(sp.map(clean))].join(' · ')+'. Bring appliance dolly, straps & ramps.']);
  let boxes=0;all.forEach(it=>{if(/BOX|PLASTIC BIN|WARDROBE/.test(it.name.toUpperCase()))boxes+=it.qty;});
  if(boxes)notes.push(['Boxes',boxes+' boxes (incl. wardrobe) — bring wardrobe bars; stack boxes to stabilize the load.']);
  const pbo=has(/\(PBO\)|\bPBO\b/);if(pbo.length)notes.push(['Packed by owner (PBO) — limited liability',[...new Set(pbo.map(it=>it.name.replace(/\s*\([^)]*\)/g,'').trim()))].join(' · ')+'. Note condition at origin.']);
  if(has(/BED|DESK|DINING TABLE|TABLE, DINING|CRIB|BUNK/).length)notes.push(['Disassembly likely','Beds, desks, dining table — bring tools; all drawers must be emptied before the move.']);
  const fr=has(/TV|FLAT SCREEN|PICTURE|PAINTING|MIRROR|GLASS/);if(fr.length)notes.push(['Fragile — pad & box',[...new Set(fr.map(it=>it.name.replace(/\s*\([^)]*\)/g,'').trim()))].slice(0,6).join(' · ')+'. Use TV / picture cartons.']);
  notes.push(['Reminders','No plastic bags on the truck. Confirm the valuation election ('+e.valuation+') with the customer at signing.']);
  return notes;
}

   <div class="bolsec"><h4><span class="step">7</span> Long-distance form (LDF-08)</h4>
     <label class="chk"><input type="checkbox" id="b_storage" ${s.storage?'checked':''}> Storage in transit needed</label>
     <div class="twocol"><div class="f"><label class="fl">Storage start</label><input type="date" id="b_storageStart" value="${esc(s.storageStart)}"></div>
       <div class="f"><label class="fl">Storage end</label><input type="date" id="b_storageEnd" value="${esc(s.storageEnd)}"></div></div>
     <label class="chk" style="margin-top:8px"><input type="checkbox" id="b_ttAccess" ${s.ttAccess?'checked':''}> Tractor-trailer (72 ft) access available (uncheck if shuttle needed)</label>
     <div class="twocol"><div class="f"><label class="fl">Dwelling — origin</label><select id="b_dwellingO">${dw(s.dwellingO)}</select></div>
       <div class="f"><label class="fl">Dwelling — destination</label><select id="b_dwellingD">${dw(s.dwellingD)}</select></div>
       <div class="f"><label class="fl">If walk-up, # of flights</label><input id="b_walkupFlights" value="${esc(s.walkupFlights)}"></div></div>
     <label class="chk" style="margin-top:8px"><input type="checkbox" id="b_accessDenied" ${s.accessDenied?'checked':''}> Times access may be denied</label>
     <div class="f"><label class="fl">If yes, explain</label><input id="b_accessExplain" value="${esc(s.accessExplain)}"></div></div>
   <div class="sigblock" id="sig_ldf"></div>

   <div class="bolsec"><h4><span class="step">8</span> Packing &amp; bulky (PMS-19)</h4>
     <label class="chk"><input type="checkbox" id="b_fullPack" ${s.fullPack?'checked':''}> Full packing performed</label>
     ${bulkyList(e).length?`<div class="muted" style="margin:6px 0;color:#7a5200">⚠ Bulky from inventory: ${esc(bulkyList(e).join(' · '))}</div>`:''}
     <div class="twocol"><div class="f"><label class="fl">Materials / notes</label><input id="b_materialsNote" value="${esc(s.materialsNote)}" placeholder="e.g. 20 dish packs, 4 wardrobe boxes, TV cartons"></div>
       <div class="f"><label class="fl">Total packing &amp; materials</label><input id="b_packTotal" class="mny" value="${esc(s.packTotal)}" placeholder="$"></div></div></div>
   <div class="sigblock" id="sig_pms"></div>

   <div class="bolsec"><h4><span class="step">9</span> Condition &amp; exceptions</h4>
     <div class="f"><label class="fl">Damage / exceptions noted at pickup (shown on delivery acknowledgement)</label><textarea id="b_exceptions" rows="3" placeholder="e.g. scratch on dresser top, dent on washer door">${esc(s.exceptions)}</textarea></div></div>

   <div class="bolsec"><h4><span class="step">10</span> Finish</h4>
     <p class="muted" id="sigCount2" style="margin:0 0 10px"></p>
     <div class="btnrow"><button onclick="generateBOL('${job.id}')">✅ Generate signed Bill of Lading</button><button class="ghost" onclick="openFmJob('${job.id}')">Cancel</button></div>
     <p class="muted" style="margin-top:8px">All section signatures, timestamps, device &amp; (if allowed) location are captured for the audit trail. Delivery acknowledgements are signed at delivery.</p></div>`;
  setTimeout(()=>{padSetup('b_custSig');padSetup('b_foreSig');window._sigState={ack:{}};fillSigBlocks();},30);
  window.scrollTo(0,0);
}
const SIG_TEXT={
 valuation:'I have selected the valuation option above and received the "Your Rights and Responsibilities When You Move" booklet.',
 documents:'I have received the publications: Ready to Move; Claim Filing & Arbitration Program; tariff availability, method of conversion and removed weighing of the truck.',
 bolReceipt:'I have received a copy of this Bill of Lading as required by law. I read, understand and agree to the terms on this contract. I have up to 3 days to cancel without penalty.',
 pickup:'I have full authority to enter into this agreement and am responsible for the charges listed above, based on the actual weight or space occupied by my shipment. I agree to and accept the charges.',
 accessorial:'I request the accessorial / post-contract services above, which are in addition to the transportation charges, and accept the accessorial service charges as outlined.',
 ldf:'I confirm the Long Distance Form delivery details, access information and dates above.',
 pms:'I request the packing supplies and services above; I understand they are necessary and accept the charges as outlined.'};
const SIGPTS=[
 {key:'valuation',label:'Valuation election',who:['cust']},
 {key:'documents',label:'Documents & "Rights and Responsibilities" booklet received',who:['cust']},
 {key:'bolReceipt',label:'Bill of Lading receipt acknowledgement',who:['cust','carrier']},
 {key:'pickup',label:'Pick-up acknowledgement (authority & charges)',who:['cust','carrier']},
 {key:'accessorial',label:'Accessorial & post-contract services (AS-22)',who:['cust','carrier']},
 {key:'ldf',label:'Long Distance Form (LDF-08)',who:['cust']},
 {key:'pms',label:'Packing & materials / bulky (PMS-19)',who:['cust','carrier']}];
function sigLabel(pt){if(pt.key==='valuation'){const v=(document.querySelector('input[name=b_val]:checked')||{}).value;return 'Valuation election — '+(v==='full'?'Option 1, Full Value':'Option 2, 60¢/lb waiver');}return pt.label;}
function sigBlockInner(key){const pt=SIGPTS.find(p=>p.key===key);if(!pt)return '';const st=window._sigState=window._sigState||{ack:{}};const a=st.ack[key]||{};
  const slots=pt.who.map(w=>{const sg=a[w];const who=w==='cust'?'Customer':'Foreman';
    return `<div class="sigslot ${sg?'on':''}"><span class="who">${who}</span>${sg?`<img src="${sg.img}"><span class="ts">${(sg.ts.split(',')[1]||'').trim()}</span><button class="sigbtn ghost" onclick="clearSig('${key}','${w}')">↺</button>`:`<button class="sigbtn" onclick="applySig('${key}','${w}')">✍️ Sign</button>`}</div>`;}).join('');
  return `<div class="sct">✍️ ${esc(sigLabel(pt))}</div><div class="sigack">${esc(SIG_TEXT[key]||'')}</div><div class="sigslots">${slots}</div>`;}
function refreshSig(key){const el=document.getElementById('sig_'+key);if(el)el.innerHTML=sigBlockInner(key);updateSigCount();}
function fillSigBlocks(){SIGPTS.forEach(pt=>refreshSig(pt.key));}
function applySig(key,who){const d=who==='cust'?padData('b_custSig'):padData('b_foreSig');if(!d){alert('Capture the '+(who==='cust'?'customer':'foreman')+' signature in Signature setup at the top first.');return;}const st=window._sigState=window._sigState||{ack:{}};st.ack[key]=st.ack[key]||{};st.ack[key][who]={img:d,ts:now()};refreshSig(key);}
function clearSig(key,who){const st=window._sigState||{ack:{}};if(st.ack[key])delete st.ack[key][who];refreshSig(key);}
function updateSigCount(){const st=window._sigState||{ack:{}};let need=0,have=0;SIGPTS.forEach(pt=>pt.who.forEach(w=>{need++;if(st.ack[pt.key]&&st.ack[pt.key][w])have++;}));
  const txt=`<b>${have} of ${need}</b> section signatures collected.`+(have<need?'':' ✓ All set.');[document.getElementById('sigCount'),document.getElementById('sigCount2')].forEach(c=>{if(c)c.innerHTML=txt;});}
function bolSel(el){[...el.parentNode.querySelectorAll('.opt')].forEach(o=>o.classList.remove('sel'));el.classList.add('sel');el.querySelector('input').checked=true;if(document.getElementById('sig_valuation'))refreshSig('valuation');}
function padSetup(id){const c=document.getElementById(id);if(!c)return;const r=c.getBoundingClientRect();const dpr=window.devicePixelRatio||1;c.width=Math.max(1,r.width*dpr);c.height=Math.max(1,r.height*dpr);const ctx=c.getContext('2d');ctx.scale(dpr,dpr);ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#13294b';c.dataset.drawn='';let drawing=false,last=null;
  const pos=ev=>{const b=c.getBoundingClientRect();const t=(ev.touches&&ev.touches[0])||ev;return{x:t.clientX-b.left,y:t.clientY-b.top};};
  const down=ev=>{drawing=true;last=pos(ev);ev.preventDefault();};
  const mv=ev=>{if(!drawing)return;const q=pos(ev);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q;c.dataset.drawn='1';ev.preventDefault();};
  const up=()=>{drawing=false;};
  c.addEventListener('pointerdown',down);c.addEventListener('pointermove',mv);window.addEventListener('pointerup',up);}
function padClear(id){const c=document.getElementById(id);if(!c)return;c.getContext('2d').clearRect(0,0,c.width,c.height);c.dataset.drawn='';}
function padRestore(id,url){const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d'),dpr=window.devicePixelRatio||1,img=new Image();img.onload=()=>ctx.drawImage(img,0,0,c.width/dpr,c.height/dpr);img.src=url;c.dataset.drawn='1';}
function padData(id){const c=document.getElementById(id);return c&&c.dataset.drawn?c.toDataURL('image/png'):'';}
function generateBOL(id){const v=s=>{const el=document.getElementById(s);return el?el.value.trim():'';};const ck=s=>{const el=document.getElementById(s);return!!(el&&el.checked);};
  const val=(document.querySelector('input[name=b_val]:checked')||{}).value||'';
  const st=window._sigState||{ack:{}};const miss=[];
  if(!v('b_actualPickup'))miss.push('actual pick-up date');if(!val)miss.push('valuation option');if(!ck('b_consent'))miss.push('customer consent');
  let sigMiss=0;SIGPTS.forEach(pt=>pt.who.forEach(w=>{if(!(st.ack[pt.key]&&st.ack[pt.key][w]))sigMiss++;}));
  if(sigMiss)miss.push(sigMiss+' signature(s) still needed');
  if(miss.length){alert('Please complete: '+miss.join(', '));return;}
  const cust=padData('b_custSig'),fore=padData('b_foreSig');
  const job=getJob(id);if(!job)return;
  const bol=Object.assign({},_bolSeed||{},{
    usdot:v('b_usdot'),mc:v('b_mc'),order:v('b_order'),vanNo:v('b_van'),crew:v('b_crew'),interliner:v('b_interliner'),
    agreedPickup:v('b_agreedPickup'),actualPickup:v('b_actualPickup'),firstAvail:v('b_firstAvail'),deliverNoLater:v('b_deliverNoLater'),
    oName:v('b_oName'),oStreet:v('b_oStreet'),oCSZ:v('b_oCSZ'),oPhone:v('b_oPhone'),oPhone2:v('b_oPhone2'),
    dName:v('b_dName'),dStreet:v('b_dStreet'),dCSZ:v('b_dCSZ'),dPhone:v('b_dPhone'),dPhone2:v('b_dPhone2'),enrouteName:v('b_enrouteName'),enroutePhone:v('b_enroutePhone'),
    valuation:val,declaredValue:v('b_declaredValue'),fvpEstimate:v('b_fvpEstimate'),
    chTransport:v('b_chTransport'),chFuel:v('b_chFuel'),chPacking:v('b_chPacking'),chBulky:v('b_chBulky'),
    chStairs:v('b_chStairs'),chElevator:v('b_chElevator'),chLongCarry:v('b_chLongCarry'),chShuttle:v('b_chShuttle'),chSIT:v('b_chSIT'),chStgHandling:v('b_chStgHandling'),chExtraLabor:v('b_chExtraLabor'),chExtraStop:v('b_chExtraStop'),chWaiting:v('b_chWaiting'),
    chConvPGS:v('b_chConvPGS'),chRedelivery:v('b_chRedelivery'),chBinding:v('b_chBinding'),chOther:v('b_chOther'),chTotal:v('b_chTotal'),
    locStairs:v('b_locStairs'),locElevator:v('b_locElevator'),locLongCarry:v('b_locLongCarry'),locShuttle:v('b_locShuttle'),locSIT:v('b_locSIT'),locStgHandling:v('b_locStgHandling'),locExtraLabor:v('b_locExtraLabor'),locExtraStop:v('b_locExtraStop'),locWaiting:v('b_locWaiting'),
    payDiscount:v('b_payDiscount'),payDeposit:v('b_payDeposit'),payOrigin:v('b_payOrigin'),payBalanceDest:v('b_payBalanceDest'),payPriceAdj:v('b_payPriceAdj'),payDestination:v('b_payDestination'),payBalance30:v('b_payBalance30'),method:v('b_method'),
    dedicatedTruck:v('b_dedicatedTruck'),expeditedDate:v('b_expeditedDate'),stairsFlights:v('b_stairsFlights'),extraLaborHrs:v('b_extraLaborHrs'),
    fullPack:ck('b_fullPack'),materialsNote:v('b_materialsNote'),packTotal:v('b_packTotal'),
    storage:ck('b_storage'),storageStart:v('b_storageStart'),storageEnd:v('b_storageEnd'),ttAccess:ck('b_ttAccess'),dwellingO:v('b_dwellingO'),dwellingD:v('b_dwellingD'),walkupFlights:v('b_walkupFlights'),accessDenied:ck('b_accessDenied'),accessExplain:v('b_accessExplain'),
    exceptions:v('b_exceptions'),originAmt:v('b_payOrigin'),
    sigs:st.ack,consent:true,custSig:cust,foreSig:fore,signed:true,signedAt:now(),device:(navigator.userAgent||'').slice(0,70),geo:window._geo||null});
  job.bol=bol;saveJob(job);renderBOLDone(id);}
function renderBOLDone(id){const job=getJob(id);const e=job.est||{},b=job.bol||{};const valLbl=b.valuation==='full'?'Option 1 — Full Value Protection':'Option 2 — Waiver (60¢/lb)';
  $('#app').innerHTML=`<div class="modebar">FOREMAN PORTAL</div>
   <div class="card fmwrap"><div class="banner ok" style="margin-top:0">✅ Bill of Lading signed — Job ${job.id}<small>${esc(b.signedAt)}${b.geo?' · GPS '+b.geo.lat+','+b.geo.lng:''}</small></div>
     <div class="grid" style="margin-top:14px">
       <div class="f"><label class="fl">Customer</label><span class="v">${esc(e.customer)}</span></div>
       <div class="f"><label class="fl">Valuation</label><span class="v">${esc(valLbl)}</span></div>
       <div class="f"><label class="fl">Actual pick-up</label><span class="v">${esc(b.actualPickup)}</span></div>
       <div class="f"><label class="fl">Van # · crew</label><span class="v">${esc(b.vanNo||'—')} · ${esc(b.crew||'—')}</span></div>
       <div class="f"><label class="fl">Origin payment</label><span class="v">${b.originAmt?money(num(b.originAmt)):'—'} ${b.method?'· '+esc(b.method):''}</span></div>
       <div class="f"><label class="fl">Exceptions</label><span class="v">${esc(b.exceptions||'none noted')}</span></div></div>
     <h3 class="sg" style="margin-top:14px">Signatures collected</h3>
     ${SIGPTS.map(pt=>{const a=(b.sigs||{})[pt.key]||{};const signed=pt.who.filter(w=>a[w]).map(w=>w==='cust'?'Customer':'Foreman');return `<div class="note"><b>${esc(pt.label)}:</b> ${signed.length?signed.join(' + ')+' ✓':'<span style=\"color:#b9770e\">pending (delivery)</span>'}</div>`;}).join('')}
     <div class="ackbox" style="margin-top:14px">📄 <b>Next (Phase 2–3):</b> this signed data becomes the real 5-page PDF Bill of Lading and is emailed to the customer + stored. Those steps run on the backend.</div>
     <div class="btnrow"><button class="ghost" onclick="openBOL('${job.id}')">Re-open / edit</button><button onclick="openFmJob('${job.id}')">Done → back to job</button></div></div>`;
  window.scrollTo(0,0);
}

router();
</script>
</body>
</html>
