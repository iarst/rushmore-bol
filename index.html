/* ---------- extraction ---------- */
function extract(text){
  const g=(re,d='')=>{const m=text.match(re);return m?m[1].trim():d;};const n=re=>num(g(re));
  return{job:g(/Job\s*#?\s*(\d{6,})/i)||g(/(\d{8})/),
    rep:g(/Customer Rep:\s*([A-Za-z .']+?)(?:\s{2,}|\(|\n)/i),repPhone:g(/Customer Rep:[^\n(]*(\(\d{3}\)\s?\d{3}-\d{4})/i),
    customer:g(/Customer:\s*([A-Za-z .'-]+?)(?:\s{2,}|\()/i),phone:g(/(\(\d{3}\)\s?\d{3}-\d{4})/),email:g(/([\w.+-]+@(?!safeship)[\w.-]+\.\w+)/i),
    oAddr:g(/Moving From:\s*(.+?)(?:\s*\(|$)/im),dAddr:g(/Moving To:\s*(.+?)(?:\s*\(|$)/im),
    oType:g(/Moving From:.*\(([^)]+)\)/i),dType:g(/Moving To:.*\(([^)]+)\)/i),
    miles:g(/Long Distance,\s*([\d,]+)\s*miles/i),moveDay:g(/Move Day:\s*([A-Za-z\/]+)/i),
    volume:n(/Volume:\s*([\d,]+)/i),rate:n(/Rate:\s*\$?([\d.]+)/i),basic:n(/Basic[^$]*\$([\d,]+\.?\d*)/i),
    total:n(/Total[^$]*\$([\d,]+\.?\d*)/i),deposit:n(/(?:deposit|Customer Payment)[^$]*\$([\d,]+\.?\d*)/i),
    valuation:/Full Value/i.test(text)?'Full Value Protection':(/60c|60¢|0\.60|waiver/i.test(text)?'60¢/lb waiver':'See estimate'),
    pgs:/\bPGS\b|Premium Guaranteed/i.test(text),
    fullPack:/Full Pack(?:ing)?\s*:?\s*Yes|Full Pack(?:ing)?\b/i.test(text),
    expedited:/Expedited|Guaranteed Delivery|Exclusive Use/i.test(text),
    notes:g(/(?:Special Instructions|Customer Notes|Notes)\s*:\s*(.+?)(?:\n|$)/i),
    pickup:g(/(?:Requested )?pickup:?\s*([\d/–-]+)/i)||'06/12/2026',delivery:g(/Delivery:\s*([\d/]+)/i)||'06/12/2026',
    firstDelivery:g(/1st Available Delivery:\s*([\d/]+)/i),
    inv:parseInventory(text)};
}
function parseInventory(text){
  const m=text.match(/Articles List\s+(\d+)\s+Items?\s+(\d+)\s+Pieces?/i); if(!m)return null;
  let start=text.indexOf(m[0])+m[0].length, end=text.length;
  [/Packing Material/i,/Understanding Your Estimate/i].forEach(re=>{const mm=text.slice(start).match(re);if(mm)end=Math.min(end,start+mm.index);});
  const lines=text.slice(start,end).split('\n').map(l=>l.trim()).filter(Boolean);
  const rooms=[];let curR=null;
  for(const l of lines){
    if(/^qty\b/i.test(l)&&/item/i.test(l))continue;
    const im=l.match(/^(\d+)\s+(.+)$/);
    if(im){if(!curR){curR={room:'GENERAL',items:[]};rooms.push(curR);}curR.items.push({qty:+im[1],name:im[2]});}
    else{curR={room:l,items:[]};rooms.push(curR);}
  }
  return{totalItems:+m[1],totalPieces:+m[2],rooms:rooms.filter(r=>r.items.length)};
}
const SPECIAL=/PIANO|SAFE|REFRIGERAT|FREEZER|WASH|DRYER|TREADMILL|POOL TABLE|RIDE|RIDING|MOWER|KAYAK|CANOE|GENERATOR|SNOWBLOWER|MOTORCYCLE|JACUZZI|ATV|GOLF CART|VENDING|BULK FEE|GUN/i;
function invSummary(inv){let boxes=0;const special=[];
  inv.rooms.forEach(r=>r.items.forEach(it=>{const n=it.name.toUpperCase();
    if(/BOX|PLASTIC BIN|WARDROBE/.test(n))boxes+=it.qty;
    if(SPECIAL.test(n))special.push((it.qty>1?it.qty+'× ':'')+it.name.replace(/\s*\([^)]*\)/g,'').trim());}));
  return{boxes,special};}
function inventoryHTML(inv){
  if(!inv)return '<p class="muted">No itemized inventory on this estimate.</p>';
  const s=invSummary(inv);
  const chips=`<div class="chips"><span class="chip">${inv.totalPieces} pieces</span><span class="chip">${inv.totalItems} line items</span>
    <span class="chip box">${s.boxes} boxes</span><span class="chip">${inv.rooms.length} rooms</span>
    ${s.special.length?`<span class="chip warn">${s.special.length} bulky / special</span>`:''}</div>`;
  const sp=s.special.length?`<div class="muted" style="margin:2px 0 10px;color:#7a5200">⚠ Crew heads-up: ${esc([...new Set(s.special)].join(' · '))}</div>`:'';
  const rooms=inv.rooms.map(r=>`<div class="rm"><div class="rmh">${esc(r.room)} <span class="muted" style="font-weight:600">· ${r.items.reduce((a,i)=>a+i.qty,0)} pcs</span></div>

  return chips+sp+`<details class="inv"><summary>📋 Show / hide room-by-room inventory (${inv.rooms.length} rooms)</summary><div class="rooms" style="margin-top:8px">${rooms}</div></details>`;
}

/* ===== JOB SHEET (contract + inventory + crew notes) ===== */
function crewNotes(e){
  const notes=[];const acc={House:'House — first flight (14 stairs) included; confirm truck parking & driveway clearance.',Apartment:'Apartment — check floor / elevator / long-carry (possible extra charges); reserve the elevator.',Storage:'Storage facility — confirm access hours, unit number & loading dock.'};
  if(e.oType)notes.push(['Origin access',acc[e.oType]||e.oType]);
  if(e.dType)notes.push(['Destination access',acc[e.dType]||e.dType]);
  const inv=e.inv;
  if(!inv){notes.push(['Inventory','No itemized inventory on this estimate — confirm contents with the office.']);return notes;}
  const all=[];inv.rooms.forEach(r=>r.items.forEach(it=>all.push(it)));
  const has=re=>all.filter(it=>re.test(it.name.toUpperCase()));
  const clean=it=>(it.qty>1?it.qty+'× ':'')+it.name.replace(/\s*\([^)]*\)/g,'').trim();
  const sp=has(SPECIAL);if(sp.length)notes.push(['Bulky / special — allow extra time + gear',[...new Set(sp.map(clean))].join(' · ')+'. Bring appliance dolly, straps & ramps.']);
  let boxes=0;all.forEach(it=>{if(/BOX|PLASTIC BIN|WARDROBE/.test(it.name.toUpperCase()))boxes+=it.qty;});
  if(boxes)notes.push(['Boxes',boxes+' boxes (incl. wardrobe) — bring wardrobe bars; stack boxes to stabilize the load.']);
  const pbo=has(/\(PBO\)|\bPBO\b/);if(pbo.length)notes.push(['Packed by owner (PBO) — limited liability',[...new Set(pbo.map(it=>it.name.replace(/\s*\([^)]*\)/g,'').trim()))].join(' · ')+'. Note condition at origin.']);
  if(has(/BED|DESK|DINING TABLE|TABLE, DINING|CRIB|BUNK/).length)notes.push(['Disassembly likely','Beds, desks, dining table — bring tools; all drawers must be emptied before the move.']);
  const fr=has(/TV|FLAT SCREEN|PICTURE|PAINTING|MIRROR|GLASS/);if(fr.length)notes.push(['Fragile — pad & box',[...new Set(fr.map(it=>it.name.replace(/\s*\([^)]*\)/g,'').trim()))].slice(0,6).join(' · ')+'. Use TV / picture cartons.']);
  notes.push(['Reminders','No plastic bags on the truck. Confirm the valuation election ('+e.valuation+') with the customer at signing.']);
  return notes;
}

/* ===== ON-SITE BILL OF LADING — fill + dual e-signature (Phase 1) ===== */
let _bolSeed=null;
function splitStreet(f){const i=(f||'').indexOf(',');return i<0?(f||''):f.slice(0,i).trim();}
function splitCSZ(f){const i=(f||'').indexOf(',');return i<0?'':f.slice(i+1).trim();}
function bulkyFeeSum(e){if(!e||!e.inv)return '';let s=0;e.inv.rooms.forEach(r=>r.items.forEach(it=>{const m=it.name.match(/(\d+)\s*BULK\s*FEE/i);if(m)s+=+m[1];}));return s||'';}
function bolSeed(job){const e=job.est||{},b=job.bol||{};const p=payments(e);const d=(job.eta&&job.eta.date)||'';
  // seed charge lines so they SUM to the estimate total (any unitemized remainder lands in "Other")
  const _vol=e.volume?+String(e.volume).replace(/,/g,''):0;
  const _pct=parseFloat(e.fuelPct||'15')||0;
  const _basic=(e.basic!=null?+e.basic:0);
  const _fuelComp=(_basic&&_pct)?+(_basic*_pct/100).toFixed(2):0;
  const _fuelA=(e.fuelAmt!=null?+e.fuelAmt:_fuelComp)||0;
  const _packA=+e.packAmt||0;
  const _shuttleA=+e.shuttleAmt||0;
  const _bulkyA=(e.bulkyAmt!=null?+e.bulkyAmt:(+bulkyFeeSum(e)||0))||0;
  const _convA=(+e.convenienceAmt||0)+(+e.pgsAmt||0);   // "Convenience fee + PGS delivery" row
  const _exped=+e.expeditedAmt||0;
  const _binding=+e.bindingAmt||0;
  const _disc=+e.discount||0;
  const _net=(e.total!=null?+e.total:0);
  const _gross=+( _net+_disc ).toFixed(2);
  // every charge that has its own BOL row; everything else (binding, expedited, itemized extras) reconciles into "Other"
  const _namedNonOther=_basic+_fuelA+_packA+_shuttleA+_bulkyA+_convA;
  const _other=_gross>0?Math.max(0,+(_gross-_namedNonOther).toFixed(2)):0;
  const _packRateTier=_vol<=500?2:(_vol<=1000?1.75:1.5);
  const _packRate=(_packA>0&&_vol>0)?+(_packA/_vol).toFixed(2):_packRateTier;  // use the estimate's actual $/cf when packing was quoted
  // describe what's bundled into "Other", with each amount, so the customer sees the breakdown
  const _otherParts=[];
  if(_binding>0)_otherParts.push('Binding estimate fee '+money(_binding));
  if(_exped>0)_otherParts.push('Expedited '+money(_exped));
  const _otherRem=+(_other-_binding-_exped).toFixed(2);
  if(Math.abs(_otherRem)>=0.5)_otherParts.push('Other charges '+money(_otherRem));
  const _otherDesc=_otherParts.join(' + ')||'Binding estimate fee';
  return Object.assign({
    usdot:'4086767',mc:'1560709',order:job.id,vanNo:'',crew:'',interliner:'',
    agreedPickup:d,actualPickup:d,firstAvail:e.firstDelivery||'',deliverNoLater:'',
    oName:e.customer||'',oStreet:splitStreet(e.oAddr),oCSZ:splitCSZ(e.oAddr),oPhone:e.phone||'',oPhone2:'',
    dName:e.customer||'',dStreet:splitStreet(e.dAddr),dCSZ:splitCSZ(e.dAddr),dPhone:e.phone||'',dPhone2:'',
    enrouteName:'',enroutePhone:'',
    valuation:/Full Value/i.test(e.valuation||'')?'full':'waiver',declaredValue:'',fvpEstimate:'',
    chTransport:(_basic||''),fuelPct:(e.fuelPct||'15'),chFuel:(_fuelA||''),chPacking:(_packA||''),chBulky:(_bulkyA||''),
    chStairs:'',chElevator:'',chLongCarry:'',chShuttle:(_shuttleA||''),chSIT:'',chStgHandling:'',chExtraLabor:'',chExtraStop:'',chWaiting:'',
    chConvPGS:(_convA||''),chRedelivery:'',chBinding:'',chOther:(_other||''),chOtherDesc:_otherDesc,chTotal:(_gross||''),

function recalcFuel(){const g=id=>{const el=document.getElementById(id);return el?(num(el.value)||0):0;};

  recalcTotal();}
function recalcTotal(){const g=id=>{const el=document.getElementById(id);return el?(num(el.value)||0):0;};
  const keys=['b_chTransport','b_chFuel','b_chPacking','b_chBulky','b_chStairs','b_chElevator','b_chLongCarry','b_chShuttle','b_chSIT','b_chStgHandling','b_chExtraLabor','b_chExtraStop','b_chWaiting','b_chConvPGS','b_chRedelivery','b_chBinding','b_chOther'];

  recalcBalance();}
function addCustomCharge(label,amt){const box=document.getElementById('customCharges');if(!box)return;const d=document.createElement('div');d.className='ccrow chrow';d.innerHTML='<span><input class="cclabel" value="'+esc(label||'')+'" placeholder="charge description" style="width:230px;padding:4px 6px"></span><span class="ce"><input class="ccamt mny" value="'+(amt!=null?esc(amt):'')+'" placeholder="$" oninput="recalcTotal()" style="width:110px"><button type="button" class="padclear" onclick="this.closest(\'.ccrow\').remove();recalcTotal()">✕</button></span>';box.appendChild(d);recalcTotal();}
function recalcBalance(){const g=id=>{const el=document.getElementById(id);return el?(num(el.value)||0):0;};
  const ct=document.getElementById('b_chTotal'),ref=document.getElementById('b_payTotalRef');if(ct&&ref)ref.value=ct.value;
  const bal=g('b_chTotal')-g('b_payDiscount')-g('b_payDeposit')-g('b_payOrigin');
  const el=document.getElementById('b_payBalanceDest');if(el)el.value=(Math.round(bal*100)/100).toFixed(2);}
function toggleStorage(){const sel=document.getElementById('b_storage'),box=document.getElementById('storageDates');if(box)box.style.display=(sel&&sel.value==='Yes')?'':'none';}

function addMatRow(name,qty){const box=document.getElementById('matRows');if(!box)return;const d=document.createElement('div');d.className='matrow';d.style.cssText='display:flex;gap:8px;align-items:center;margin:4px 0';d.innerHTML='<select class="matSel" onchange="recalcPack()" style="flex:1;padding:5px 6px">'+matOptions(name||'')+'</select><input class="matQty" type="number" min="0" value="'+(qty!=null?qty:'')+'" oninput="recalcPack()" placeholder="qty" style="width:64px;padding:5px 6px;text-align:right"><span class="matLine" style="width:84px;text-align:right;font-weight:700">$0.00</span><button type="button" class="padclear" onclick="this.closest(\'.matrow\').remove();recalcPack()">✕</button>';box.appendChild(d);recalcPack();}

   <div class="card" id="sheetdoc">
     <div class="sampleband">PROTOTYPE · electronic Bill of Lading — signed ${esc(b.signedAt||'')}</div>
     <div class="sheethead"><div><div class="brand">RUSHMORE VAN LINES</div><div class="muted">Interstate Bill of Lading · DOT ${esc(b.usdot||'')} · ICC/MC ${esc(b.mc||'')}</div></div>
       <div style="text-align:right"><div style="font-weight:800;font-size:16px">Job ${esc(b.order||j.id)}</div><div class="muted">Van ${esc(b.vanNo||'—')} · pickup ${esc(b.actualPickup||'')}</div></div></div>
     <div class="grid" style="margin-top:12px">
       <div class="f"><label class="fl">Origin</label><span class="v">${esc(b.oName||e.customer)}</span><span>${esc(b.oStreet)}, ${esc(b.oCSZ)}</span><span class="muted">${esc(b.oPhone||'')}</span></div>
       <div class="f"><label class="fl">Destination</label><span class="v">${esc(b.dName||e.customer)}</span><span>${esc(b.dStreet)}, ${esc(b.dCSZ)}</span><span class="muted">${esc(b.dPhone||'')}</span></div></div>
     <h3 class="sg" style="margin-top:14px">Valuation</h3>
     <div class="note">${b.valuation==='full'?'Option 1 — Full (Replacement) Value Protection'+(num(b.declaredValue)?' · declared value '+bolMoney(b.declaredValue):''):'Option 2 — Waiver, Released Value 60¢ / lb per article'}</div>
     ${docSig(b,'valuation')}
     <h3 class="sg" style="margin-top:6px">Services &amp; charges</h3>
     <table class="doctbl"><tbody>
       <tr><td>Transportation (${esc(e.volume)} cf @ $${esc(e.rate)})</td><td class="r">${bolMoney(b.chTransport)}</td></tr>
       ${num(b.chFuel)?`<tr><td>Fuel surcharge</td><td class="r">${bolMoney(b.chFuel)}</td></tr>`:''}
       ${num(b.chPacking)?`<tr><td>Packing labor &amp; materials</td><td class="r">${bolMoney(b.chPacking)}</td></tr>`:''}
       ${num(b.chBulky)?`<tr><td>Bulky articles</td><td class="r">${bolMoney(b.chBulky)}</td></tr>`:''}
       ${accRows}
       ${num(b.chConvPGS)?`<tr><td>Convenience fee + PGS delivery</td><td class="r">${bolMoney(b.chConvPGS)}</td></tr>`:''}
       ${num(b.chBinding)?`<tr><td>Binding estimate fee</td><td class="r">${bolMoney(b.chBinding)}</td></tr>`:''}
       ${num(b.chOther)?`<tr><td>Other</td><td class="r">${bolMoney(b.chOther)}</td></tr>`:''}
       <tr class="tot"><td>TOTAL APPLICABLE CHARGES</td><td class="r">${bolMoney(b.chTotal)}</td></tr>
     </tbody></table>
     ${docSig(b,'accessorial')}
     <h3 class="sg" style="margin-top:6px">Payment</h3>
     <table class="doctbl"><tbody>
       <tr><td>Prepaid deposit</td><td class="r">${bolMoney(b.payDeposit)}</td></tr>
       <tr><td>Origin payment collected${b.method?' ('+esc(b.method)+')':''}</td><td class="r">${bolMoney(b.payOrigin)}</td></tr>
       <tr><td>Balance due at destination</td><td class="r">${bolMoney(b.payBalanceDest)}</td></tr>
     </tbody></table>
     ${docSig(b,'documents')}
     ${docSig(b,'bolReceipt')}
     ${docSig(b,'pickup')}
     <h3 class="sg" style="margin-top:6px">Long Distance Form (LDF-08)</h3>
     <div class="note">Storage: ${b.storage?'Yes ('+esc(b.storageStart)+' – '+esc(b.storageEnd)+')':'No'} · Tractor-trailer access: ${b.ttAccess?'Yes':'No'} · Origin ${esc(b.dwellingO)} · Destination ${esc(b.dwellingD)}${b.accessExplain?' · Access notes: '+esc(b.accessExplain):''}</div>

     <h3 class="sg" style="margin-top:6px">Packing &amp; materials (PMS-19)</h3>
     <div class="note">Full packing: ${b.fullPack?'Yes':'No'}${b.materialsNote?' · '+esc(b.materialsNote):''}${num(b.packTotal)?' · total '+bolMoney(b.packTotal):''}</div>
     ${docSig(b,'pms')}
     <h3 class="sg" style="margin-top:6px">Condition &amp; exceptions</h3>
     <div class="note">${esc(b.exceptions||'None noted at pickup.')}</div>
     <p class="muted" style="margin-top:12px">Audit trail — signed ${esc(b.signedAt||'')}${b.geo?' · GPS '+b.geo.lat+', '+b.geo.lng:''} · ${esc(b.device||'')}</p>
   </div>`;
  window.scrollTo(0,0);
}

/* ---- PIN gate + app init ---- */
function initApp(){
  try{const all=store.get();const clean=all.filter(j=>j.id!=='90000001');if(clean.length!==all.length)store.set(clean);}catch(e){}
  router();
  // pull the shared board so this device sees the same jobs as every other device
  if(isOfficeView())syncBoard().then(()=>{if(!location.hash)render('dashboard');});
  setTimeout(autoPoll,4000);
  setInterval(autoPoll,5*60*1000);
}
function gate(){
  if(localStorage.getItem('rvl_pin')==='2026'){initApp();return;}
  const ov=document.createElement('div');ov.id='pinGate';
  ov.innerHTML='<div class="pinbox"><div class="pinlogo">Rushmore Van Lines</div><div class="pinsub">Enter access PIN to continue</div><input id="pinIn" type="password" inputmode="numeric" maxlength="8" autocomplete="off" placeholder="PIN"><button id="pinBtn">Enter</button><div id="pinErr" class="pinerr"></div></div>';
  document.body.appendChild(ov);
  const inp=ov.querySelector('#pinIn'),btn=ov.querySelector('#pinBtn'),err=ov.querySelector('#pinErr');
  function tryPin(){if(inp.value.trim()==='2026'){localStorage.setItem('rvl_pin','2026');ov.remove();initApp();}else{err.textContent='Incorrect PIN — try again';inp.value='';inp.focus();}}
  btn.onclick=tryPin;inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryPin();});
  setTimeout(()=>inp.focus(),60);
}
gate();

/* ---- auto-poll the inbox every 5 min on the office board ---- */
function isOfficeView(){const h=location.hash||'';return !(h.indexOf('#j=')===0||h.indexOf('#fm=')===0||h.indexOf('#foreman')===0);}
async function autoPoll(){
  if(!isOfficeView())return;
  try{
    const before=store.get().length;
    const r=await fetch(BACKEND+'/ingest/poll',{method:'POST'});
    const d=await r.json();if(!d.ok)return;
    if(Array.isArray(d.jobs))store.set(d.jobs);
    if(!location.hash&&(d.new||store.get().length!==before))render('dashboard');
  }catch(e){}
}
</script>
